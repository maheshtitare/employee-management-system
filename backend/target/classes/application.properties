# ============================================
# Database Configuration
# ============================================
# Make sure MySQL is running and create database: CREATE DATABASE employee_db;
spring.datasource.url=jdbc:mysql://localhost:3306/employee_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Mahesh@748
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Settings
# update = auto creates/updates tables. Use "create" first time to start fresh.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT Configuration
# ============================================
# Secret key - must be at least 32 characters for HMAC-SHA256
app.jwt.secret=EmployeeManagementSecretKey2024SuperSecureKey!
# Token expiry = 24 hours in milliseconds (24 * 60 * 60 * 1000)
app.jwt.expiration=86400000

# ============================================
# Server
# ============================================
server.port=8080
